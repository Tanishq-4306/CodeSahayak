<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSahayak - Simple Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FF9933 0%, #FFFFFF 50%, #138808 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            margin: 0.5rem;
            background: #FF9933;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            margin: 0.5rem 0;
        }
        
        .status-ok {
            color: #10b981;
            font-weight: 600;
        }
        
        .status-error {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖</div>
        <h1>CodeSahayak</h1>
        <p>Learn Coding in Your Mother Tongue</p>
        
        <div class="status">
            <h3>System Status</h3>
            <div class="status-item">
                <span>Backend:</span>
                <span id="backend-status">Checking...</span>
            </div>
            <div class="status-item">
                <span>Frontend:</span>
                <span class="status-ok">✅ Running</span>
            </div>
        </div>
        
        <div style="margin-top: 2rem;">
            <a href="index.html" class="btn">Try Old Version</a>
            <a href="main.html" class="btn">Try New Version</a>
        </div>
    </div>
    
    <script>
        // Test backend
        fetch('http://localhost:3000/health')
            .then(response => {
                if (response.ok) {
                    document.getElementById('backend-status').innerHTML = '<span class="status-ok">✅ Running</span>';
                } else {
                    document.getElementById('backend-status').innerHTML = '<span class="status-error">❌ Error</span>';
                }
            })
            .catch(error => {
                document.getElementById('backend-status').innerHTML = '<span class="status-error">❌ Not Running</span>';
            });
    </script>
</body>
</html>
