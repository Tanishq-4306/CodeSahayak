<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSahayak Integration Test</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: #2d2d2d;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #404040;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background: #10b981; }
        .error { background: #ef4444; }
        .warning { background: #f59e0b; }
        .info { background: #3b82f6; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #5a67d8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 4px;
            color: white;
        }
        .code-block {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 CodeSahayak Integration Test</h1>
    <p>This page tests the complete frontend-backend integration.</p>

    <!-- Backend Health Check -->
    <div class="test-section">
        <h2>🏥 Backend Health Check</h2>
        <button onclick="testBackendHealth()">Check Backend Status</button>
        <div id="healthResult"></div>
    </div>

    <!-- Authentication Test -->
    <div class="test-section">
        <h2>🔐 Authentication Test</h2>
        <div>
            <h3>Sign Up Test</h3>
            <input type="text" id="testName" placeholder="Test Name" value="Test User">
            <input type="email" id="testEmail" placeholder="test@example.com" value="test@example.com">
            <input type="password" id="testPassword" placeholder="Password" value="test123">
            <button onclick="testSignup()">Test Signup</button>
        </div>
        <div>
            <h3>Login Test</h3>
            <input type="email" id="loginEmail" placeholder="Email" value="test@example.com">
            <input type="password" id="loginPassword" placeholder="Password" value="test123">
            <button onclick="testLogin()">Test Login</button>
        </div>
        <div id="authResult"></div>
    </div>

    <!-- AI Tutor Test -->
    <div class="test-section">
        <h2>🤖 AI Tutor Test</h2>
        <textarea id="testCode" rows="4" placeholder="Enter code to explain">
def factorial(n):
    if n <= 1:
        return 1
    return n * factorial(n-1)

print(factorial(5))
        </textarea>
        <select id="testLanguage">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
        </select>
        <button onclick="testExplain()">Test Explain</button>
        <button onclick="testHint()">Test Hint</button>
        <div id="aiResult"></div>
    </div>

    <!-- Code Save Test -->
    <div class="test-section">
        <h2>💾 Code Save Test</h2>
        <input type="text" id="saveTitle" placeholder="Code Title" value="Test Factorial">
        <button onclick="testSaveCode()">Test Save Code</button>
        <button onclick="testLoadSnippets()">Test Load Snippets</button>
        <div id="saveResult"></div>
    </div>

    <!-- Progress Test -->
    <div class="test-section">
        <h2>📊 Progress Test</h2>
        <button onclick="testUpdateProgress()">Test Update Progress</button>
        <button onclick="testGetStats()">Test Get Stats</button>
        <div id="progressResult"></div>
    </div>

    <!-- Complete Flow Test -->
    <div class="test-section">
        <h2>🚀 Complete Flow Test</h2>
        <button onclick="testCompleteFlow()">Run Complete Test</button>
        <div id="flowResult"></div>
    </div>

    <script src="web-ide/js/utils.js"></script>
    <script src="web-ide/js/api.js"></script>
    <script>
        let testResults = [];

        function logResult(test, success, message, data = null) {
            const result = { test, success, message, data, timestamp: new Date() };
            testResults.push(result);
            console.log(`${success ? '✅' : '❌'} ${test}: ${message}`, data);
        }

        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            const className = success ? 'success' : 'error';
            element.innerHTML = `
                <div class="test-result ${className}">
                    ${success ? '✅' : '❌'} ${message}
                    ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
                </div>
            `;
        }

        async function testBackendHealth() {
            try {
                const health = await window.checkBackendHealth();
                const success = health.status === 'OK';
                logResult('Backend Health', success, success ? 'Backend is running' : 'Backend is down', health);
                showResult('healthResult', success, success ? 'Backend is running properly!' : 'Backend is not responding', health);
            } catch (error) {
                logResult('Backend Health', false, 'Health check failed', error.message);
                showResult('healthResult', false, 'Backend health check failed: ' + error.message);
            }
        }

        async function testSignup() {
            try {
                const name = document.getElementById('testName').value;
                const email = document.getElementById('testEmail').value;
                const password = document.getElementById('testPassword').value;

                const result = await window.apiClient.signup({ name, email, password, language: 'en' });
                logResult('Signup', true, 'Signup successful', result);
                showResult('authResult', true, 'Signup successful! User created and logged in.', result);
            } catch (error) {
                logResult('Signup', false, 'Signup failed', error.message);
                showResult('authResult', false, 'Signup failed: ' + error.message);
            }
        }

        async function testLogin() {
            try {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;

                const result = await window.apiClient.login({ email, password });
                logResult('Login', true, 'Login successful', result);
                showResult('authResult', true, 'Login successful! Token received.', result);
            } catch (error) {
                logResult('Login', false, 'Login failed', error.message);
                showResult('authResult', false, 'Login failed: ' + error.message);
            }
        }

        async function testExplain() {
            try {
                const code = document.getElementById('testCode').value;
                const language = document.getElementById('testLanguage').value;

                const result = await window.apiClient.explainCode({ code, language, line: 1 });
                logResult('AI Explain', true, 'Code explanation received', result);
                showResult('aiResult', true, 'AI explanation received!', result);
            } catch (error) {
                logResult('AI Explain', false, 'Explanation failed', error.message);
                showResult('aiResult', false, 'AI explanation failed: ' + error.message);
            }
        }

        async function testHint() {
            try {
                const code = document.getElementById('testCode').value;
                const language = document.getElementById('testLanguage').value;

                const result = await window.apiClient.getHint({ code, language, level: 1 });
                logResult('AI Hint', true, 'Hint received', result);
                showResult('aiResult', true, 'AI hint received!', result);
            } catch (error) {
                logResult('AI Hint', false, 'Hint failed', error.message);
                showResult('aiResult', false, 'AI hint failed: ' + error.message);
            }
        }

        async function testSaveCode() {
            try {
                const title = document.getElementById('saveTitle').value;
                const code = document.getElementById('testCode').value;

                const result = await window.apiClient.saveCode({ title, code, language: 'python' });
                logResult('Save Code', true, 'Code saved successfully', result);
                showResult('saveResult', true, 'Code saved successfully!', result);
            } catch (error) {
                logResult('Save Code', false, 'Save failed', error.message);
                showResult('saveResult', false, 'Code save failed: ' + error.message);
            }
        }

        async function testLoadSnippets() {
            try {
                const result = await window.apiClient.getMySnippets();
                logResult('Load Snippets', true, 'Snippets loaded', result);
                showResult('saveResult', true, `Loaded ${result.snippets?.length || 0} snippets`, result);
            } catch (error) {
                logResult('Load Snippets', false, 'Load failed', error.message);
                showResult('saveResult', false, 'Load snippets failed: ' + error.message);
            }
        }

        async function testUpdateProgress() {
            try {
                const result = await window.apiClient.updateProgress({
                    concept: 'functions',
                    solved: true,
                    hintsUsed: 1
                });
                logResult('Update Progress', true, 'Progress updated', result);
                showResult('progressResult', true, 'Progress updated successfully!', result);
            } catch (error) {
                logResult('Update Progress', false, 'Progress update failed', error.message);
                showResult('progressResult', false, 'Progress update failed: ' + error.message);
            }
        }

        async function testGetStats() {
            try {
                const result = await window.apiClient.getProgressStats();
                logResult('Get Stats', true, 'Stats retrieved', result);
                showResult('progressResult', true, 'Progress stats retrieved!', result);
            } catch (error) {
                logResult('Get Stats', false, 'Stats retrieval failed', error.message);
                showResult('progressResult', false, 'Stats retrieval failed: ' + error.message);
            }
        }

        async function testCompleteFlow() {
            const flowElement = document.getElementById('flowResult');
            flowElement.innerHTML = '<div class="info">🚀 Running complete integration test...</div>';

            const tests = [
                { name: 'Backend Health', fn: testBackendHealth },
                { name: 'Authentication', fn: testLogin },
                { name: 'AI Explain', fn: testExplain },
                { name: 'Save Code', fn: testSaveCode },
                { name: 'Update Progress', fn: testUpdateProgress }
            ];

            let passed = 0;
            let failed = 0;

            for (const test of tests) {
                try {
                    await test.fn();
                    passed++;
                    flowElement.innerHTML += `<div class="success">✅ ${test.name} - PASSED</div>`;
                } catch (error) {
                    failed++;
                    flowElement.innerHTML += `<div class="error">❌ ${test.name} - FAILED: ${error.message}</div>`;
                }
                await new Promise(resolve => setTimeout(resolve, 500)); // Small delay between tests
            }

            const summary = `
                <div class="test-result ${failed === 0 ? 'success' : 'warning'}">
                    <h3>🏁 Test Summary</h3>
                    <p>Passed: ${passed} | Failed: ${failed}</p>
                    <p>Integration Status: ${failed === 0 ? '✅ FULLY WORKING' : '⚠️ NEEDS ATTENTION'}</p>
                </div>
            `;
            flowElement.innerHTML += summary;
        }

        // Auto-run health check on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🧪 CodeSahayak Integration Test Page Loaded');
            setTimeout(testBackendHealth, 1000);
        });
    </script>
</body>
</html>
